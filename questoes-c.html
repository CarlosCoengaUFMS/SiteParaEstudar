<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões de Programação C · SiteParaEstudar</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --surface: #15151a;
            --card: #1c1c24;
            --border: #2a2a38;
            --accent: #7c6dfa;
            --accent2: #6dfabc;
            --accent3: #fa6d8a;
            --text: #e8e8f0;
            --muted: #7878a0;
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --warning: #fadc6d;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.2em;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        
        /* Navegação das questões */
        .quest-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            justify-content: center;
        }
        .quest-nav button {
            width: 40px; height: 40px;
            border-radius: 10px;
            border: 2px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .quest-nav button:hover { border-color: var(--accent); }
        .quest-nav button.active { 
            background: var(--accent); 
            border-color: var(--accent);
            color: #fff;
        }
        .quest-nav button.correct { 
            background: var(--correct); 
            border-color: var(--correct);
            color: #fff;
        }
        .quest-nav button.wrong { 
            background: var(--wrong); 
            border-color: var(--wrong);
            color: #fff;
        }
        
        /* Card da questão */
        .quest-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .quest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .quest-number {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }
        .quest-points {
            background: rgba(250,220,109,0.15);
            color: var(--warning);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .quest-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #fff;
        }
        .quest-desc {
            color: var(--muted);
            margin-bottom: 20px;
            line-height: 1.8;
        }
        .quest-desc code {
            background: rgba(124,109,250,0.15);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 5px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
        }
        .quest-example {
            background: #0a0a0d;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 20px;
        }
        .quest-example h4 {
            color: var(--accent2);
            margin-bottom: 10px;
            font-size: 14px;
        }
        .quest-example pre {
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: var(--muted);
            white-space: pre-wrap;
            line-height: 1.6;
        }
        
        /* Área de código */
        .code-section {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }
        @media (max-width: 900px) {
            .code-section { grid-template-columns: 1fr; }
        }
        
        .code-editor {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .code-header {
            background: var(--border);
            padding: 10px 16px;
            font-size: 12px;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        textarea.code-area {
            width: 100%;
            min-height: 350px;
            background: #0a0a0d;
            color: #e8e8f0;
            border: none;
            padding: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.7;
            resize: vertical;
            outline: none;
            tab-size: 4;
        }
        
        .test-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .test-panel h3 {
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 15px;
        }
        .test-case {
            background: #0a0a0d;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 12px;
        }
        .test-case .label {
            color: var(--muted);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .test-case .value {
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: var(--text);
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-submit {
            background: var(--accent);
            color: #fff;
            font-size: 16px;
            padding: 14px 36px;
            box-shadow: 0 6px 20px rgba(124,109,250,0.3);
        }
        .btn-submit:hover { background: #8f80ff; transform: translateY(-1px); }
        .btn-submit:disabled { background: #555; cursor: not-allowed; transform: none; }
        .btn-hint {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
        }
        .btn-hint:hover { border-color: var(--warning); color: var(--warning); }
        
        .result-box {
            display: none;
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.7;
        }
        .result-box.show { display: block; }
        .result-box.success {
            background: rgba(46,204,113,0.1);
            border: 1px solid rgba(46,204,113,0.3);
            color: var(--correct);
        }
        .result-box.fail {
            background: rgba(231,76,60,0.1);
            border: 1px solid rgba(231,76,60,0.3);
            color: #ff8080;
        }
        .result-box pre {
            font-family: 'Fira Code', monospace;
            font-size: 12px;
            margin-top: 8px;
            white-space: pre-wrap;
        }
        
        .score-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13,13,15,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-radius: 12px;
        }
        .score-info {
            display: flex;
            gap: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .score-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .spinner {
            display: none;
            width: 20px; height: 20px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .spinner.show { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .hint-box {
            display: none;
            background: rgba(250,220,109,0.08);
            border: 1px solid rgba(250,220,109,0.25);
            color: var(--warning);
            padding: 14px 18px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 13px;
            line-height: 1.7;
        }
        .hint-box.show { display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Questões de Programação em C</h1>
    
    <!-- Barra de Progresso -->
    <div class="score-bar">
        <div class="score-info">
            <div class="score-item">✅ <span id="correct-count">0</span>/<span id="total-quest">5</span></div>
            <div class="score-item">⭐ <span id="total-score">0</span> pontos</div>
        </div>
        <div class="score-info">
            <div class="score-item" style="color: var(--accent2);">🟢 GCC Online</div>
        </div>
    </div>
    
    <!-- Navegação -->
    <div class="quest-nav" id="quest-nav"></div>
    
    <!-- Questão Atual -->
    <div class="quest-card" id="quest-card"></div>
</div>

<script>
// ========== BANCO DE QUESTÕES ==========
const QUESTOES = [
    {
        id: 1,
        titulo: "Soma de Dois Números",
        pontos: 10,
        enunciado: `
            <p>Escreva um programa em C que <strong>leia dois números inteiros</strong> e <strong>imprima a soma</strong> deles.</p>
        `,
        exemplo: `Entrada:  5 8\nSaída:    13\n\nEntrada:  -3 10\nSaída:    7`,
        codeTemplate: `#include <stdio.h>

int main() {
    int a, b;
    scanf("%d %d", &a, &b);
    
    // Seu código aqui
    
    return 0;
}`,
        testCases: [
            { input: "5 8", expected: "13" },
            { input: "-3 10", expected: "7" },
            { input: "0 0", expected: "0" },
            { input: "100 200", expected: "300" }
        ],
        dica: "Use <code>printf(\"%d\", a + b);</code> para imprimir a soma."
    },
    {
        id: 2,
        titulo: "Maior de Três Números",
        pontos: 15,
        enunciado: `
            <p>Escreva um programa que <strong>leia três números inteiros</strong> e <strong>imprima o maior</strong> deles.</p>
        `,
        exemplo: `Entrada:  5 8 3\nSaída:    8\n\nEntrada:  10 10 5\nSaída:    10`,
        codeTemplate: `#include <stdio.h>

int main() {
    int a, b, c;
    scanf("%d %d %d", &a, &b, &c);
    
    // Seu código aqui
    
    return 0;
}`,
        testCases: [
            { input: "5 8 3", expected: "8" },
            { input: "10 10 5", expected: "10" },
            { input: "-1 -5 -3", expected: "-1" },
            { input: "7 7 7", expected: "7" }
        ],
        dica: "Use <code>if</code> e <code>else</code> para comparar. Crie uma variável <code>maior</code>."
    },
    {
        id: 3,
        titulo: "Tabuada",
        pontos: 15,
        enunciado: `
            <p>Escreva um programa que <strong>leia um número inteiro</strong> e <strong>imprima a tabuada</strong> dele de 1 a 10.</p>
            <p>Cada linha no formato: <code>N x i = resultado</code></p>
        `,
        exemplo: `Entrada:  7\nSaída:\n7 x 1 = 7\n7 x 2 = 14\n...\n7 x 10 = 70`,
        codeTemplate: `#include <stdio.h>

int main() {
    int n, i;
    scanf("%d", &n);
    
    // Seu código aqui
    
    return 0;
}`,
        testCases: [
            { input: "7", expected: "7 x 1 = 7\n7 x 2 = 14\n7 x 3 = 21\n7 x 4 = 28\n7 x 5 = 35\n7 x 6 = 42\n7 x 7 = 49\n7 x 8 = 56\n7 x 9 = 63\n7 x 10 = 70" },
            { input: "3", expected: "3 x 1 = 3\n3 x 2 = 6\n3 x 3 = 9\n3 x 4 = 12\n3 x 5 = 15\n3 x 6 = 18\n3 x 7 = 21\n3 x 8 = 24\n3 x 9 = 27\n3 x 10 = 30" }
        ],
        dica: "Use um loop <code>for(i = 1; i <= 10; i++)</code> e imprima no formato pedido."
    },
    {
        id: 4,
        titulo: "Fatorial",
        pontos: 20,
        enunciado: `
            <p>Escreva um programa que <strong>leia um número inteiro positivo</strong> e <strong>calcule o fatorial</strong> dele.</p>
            <p>Imprima apenas o resultado.</p>
        `,
        exemplo: `Entrada:  5\nSaída:    120\n\nEntrada:  0\nSaída:    1`,
        codeTemplate: `#include <stdio.h>

int main() {
    int n, i;
    long long fat = 1;
    scanf("%d", &n);
    
    // Seu código aqui
    
    return 0;
}`,
        testCases: [
            { input: "5", expected: "120" },
            { input: "0", expected: "1" },
            { input: "1", expected: "1" },
            { input: "10", expected: "3628800" }
        ],
        dica: "Use <code>for(i = 1; i <= n; i++) fat *= i;</code> e depois imprima <code>fat</code>."
    },
    {
        id: 5,
        titulo: "Contar Pares e Ímpares",
        pontos: 20,
        enunciado: `
            <p>Escreva um programa que <strong>leia 5 números inteiros</strong> e <strong>imprima quantos são pares e quantos são ímpares</strong>.</p>
            <p>Formato: <code>Pares: X\nImpares: Y</code></p>
        `,
        exemplo: `Entrada:  2 4 7 9 10\nSaída:    Pares: 3\nImpares: 2`,
        codeTemplate: `#include <stdio.h>

int main() {
    int num, i;
    int pares = 0, impares = 0;
    
    // Seu código aqui
    
    return 0;
}`,
        testCases: [
            { input: "2 4 7 9 10", expected: "Pares: 3\nImpares: 2" },
            { input: "1 3 5 7 9", expected: "Pares: 0\nImpares: 5" },
            { input: "2 4 6 8 10", expected: "Pares: 5\nImpares: 0" }
        ],
        dica: "Use <code>for</code> com <code>scanf</code> dentro. Verifique com <code>if(num % 2 == 0)</code>."
    }
];

// ========== ESTADO ==========
let currentQuest = 0;
let questResults = {}; // { id: 'correct' | 'wrong' | null }
let totalScore = 0;
let correctCount = 0;

// ========== INICIALIZAÇÃO ==========
function init() {
    document.getElementById('total-quest').textContent = QUESTOES.length;
    renderNav();
    renderQuest(0);
}

function renderNav() {
    const nav = document.getElementById('quest-nav');
    nav.innerHTML = QUESTOES.map((q, i) => {
        let cls = '';
        if (i === currentQuest) cls = 'active';
        else if (questResults[q.id] === 'correct') cls = 'correct';
        else if (questResults[q.id] === 'wrong') cls = 'wrong';
        return `<button class="${cls}" onclick="goToQuest(${i})">${q.id}</button>`;
    }).join('');
}

function goToQuest(index) {
    currentQuest = index;
    renderNav();
    renderQuest(index);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderQuest(index) {
    const q = QUESTOES[index];
    const card = document.getElementById('quest-card');
    
    card.innerHTML = `
        <div class="quest-header">
            <span class="quest-number">Questão ${q.id}</span>
            <span class="quest-points">⭐ ${q.pontos} pontos</span>
        </div>
        <div class="quest-title">${q.titulo}</div>
        <div class="quest-desc">${q.enunciado}</div>
        <div class="quest-example">
            <h4>📋 Exemplo:</h4>
            <pre>${q.exemplo}</pre>
        </div>
        
        <div class="code-section">
            <div class="code-editor">
                <div class="code-header">
                    <span>📝 main.c</span>
                    <span>Ctrl+Enter para enviar</span>
                </div>
                <textarea class="code-area" id="code-area" 
                    placeholder="Digite seu código C aqui..."
                    onkeydown="handleKeyDown(event)">${questResults[q.id] ? 
                        document.getElementById('code-area')?.value || q.codeTemplate : 
                        q.codeTemplate}</textarea>
            </div>
            
            <div class="test-panel">
                <h3>🧪 Casos de Teste (${q.testCases.length})</h3>
                ${q.testCases.map((tc, i) => `
                    <div class="test-case">
                        <div class="label">Teste ${i + 1}</div>
                        <div class="value">📥 Entrada: ${tc.input}</div>
                        <div class="value">📤 Esperado: ${tc.expected}</div>
                    </div>
                `).join('')}
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 20px;">
            <button class="btn btn-submit" id="submit-btn" onclick="submitCode(${q.id})">
                ✅ Enviar e Validar
            </button>
            <span class="spinner" id="spinner"></span>
            <button class="btn btn-hint" onclick="showHint(${q.id})">💡 Dica</button>
        </div>
        
        <div class="result-box" id="result-box-${q.id}"></div>
        <div class="hint-box" id="hint-box-${q.id}">${q.dica}</div>
    `;
}

// ========== SUBMETER CÓDIGO ==========
async function submitCode(questId) {
    const code = document.getElementById('code-area').value.trim();
    const quest = QUESTOES.find(q => q.id === questId);
    const resultBox = document.getElementById(`result-box-${questId}`);
    const submitBtn = document.getElementById('submit-btn');
    const spinner = document.getElementById('spinner');
    
    if (!code) {
        resultBox.className = 'result-box fail show';
        resultBox.innerHTML = '❌ Digite seu código antes de enviar!';
        return;
    }
    
    // UI loading
    submitBtn.disabled = true;
    spinner.classList.add('show');
    resultBox.className = 'result-box show';
    resultBox.innerHTML = '🔄 Compilando e testando...';
    
    let allPassed = true;
    let results = [];
    
    for (let i = 0; i < quest.testCases.length; i++) {
        const tc = quest.testCases[i];
        
        try {
            const response = await fetch('https://siteparaestudar-production.up.railway.app/compilar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code, input: tc.input })
            });
            
            if (!response.ok) throw new Error('Erro no servidor');
            
            const result = await response.json();
            
            // Comparar saída (remover espaços extras)
            const expected = tc.expected.trim();
            const got = (result.output || '').trim();
            
            const passed = got === expected && !result.error;
            
            results.push({
                test: i + 1,
                input: tc.input,
                expected: expected,
                got: got,
                error: result.error || '',
                passed: passed
            });
            
            if (!passed) allPassed = false;
            
        } catch (error) {
            results.push({
                test: i + 1,
                input: tc.input,
                expected: tc.expected,
                got: 'ERRO DE CONEXÃO',
                error: error.message,
                passed: false
            });
            allPassed = false;
        }
    }
    
    // Exibir resultados
    let html = allPassed ? 
        '<h3>🎉 Todos os testes passaram! +' + quest.pontos + ' pontos</h3>' :
        '<h3>❌ Alguns testes falharam</h3>';
    
    results.forEach(r => {
        const icon = r.passed ? '✅' : '❌';
        html += `
            <div style="margin: 10px 0; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px;">
                <strong>${icon} Teste ${r.test}:</strong> Entrada: <code>${r.input}</code><br>
                Esperado: <code>${r.expected}</code><br>
                Obtido: <code>${r.got || '(vazio)'}</code>
                ${r.error ? `<br><span style="color:#e74c3c;">Erro: ${r.error}</span>` : ''}
            </div>
        `;
    });
    
    resultBox.innerHTML = html;
    
    // Atualizar pontuação
    if (allPassed) {
        questResults[questId] = 'correct';
        totalScore += quest.pontos;
        correctCount++;
    } else {
        questResults[questId] = 'wrong';
    }
    
    // Atualizar UI
    document.getElementById('total-score').textContent = totalScore;
    document.getElementById('correct-count').textContent = correctCount;
    renderNav();
    
    // Próxima questão (se existir)
    if (allPassed && currentQuest < QUESTOES.length - 1) {
        setTimeout(() => {
            if (confirm('🎉 Parabéns! Quer ir para a próxima questão?')) {
                goToQuest(currentQuest + 1);
            }
        }, 1000);
    }
    
    submitBtn.disabled = false;
    spinner.classList.remove('show');
}

function showHint(questId) {
    const hintBox = document.getElementById(`hint-box-${questId}`);
    if (hintBox) hintBox.classList.toggle('show');
}

function handleKeyDown(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        const quest = QUESTOES[currentQuest];
        submitCode(quest.id);
    }
    if (e.key === 'Tab') {
        e.preventDefault();
        const s = e.target.selectionStart;
        e.target.value = e.target.value.substring(0, s) + '    ' + e.target.value.substring(e.target.selectionEnd);
        e.target.selectionStart = e.target.selectionEnd = s + 4;
    }
}

// Iniciar
init();
</script>
</body>
</html>
