<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compilador C · SiteParaEstudar</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --surface: #15151a;
            --card: #1c1c24;
            --border: #2a2a38;
            --accent: #7c6dfa;
            --accent2: #6dfabc;
            --accent3: #fa6d8a;
            --text: #e8e8f0;
            --muted: #7878a0;
            --correct: #2ecc71;
            --wrong: #e74c3c;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Syne', sans-serif;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            line-height: 1.5;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }
        
        .compiler-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        h1 {
            text-align: center;
            font-family: 'Syne', sans-serif;
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .editor-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .editor-panel { grid-template-columns: 1fr; }
            h1 { font-size: 24px; }
        }
        
        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }
        
        .panel h3 {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        
        textarea {
            width: 100%;
            flex: 1;
            background: #0a0a0d;
            color: #e8e8f0;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.8;
            resize: vertical;
            outline: none;
            tab-size: 4;
            transition: all 0.3s;
            min-height: 450px;
        }
        
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(124,109,250,0.15);
        }
        
        #output-area {
            width: 100%;
            min-height: 250px;
            max-height: 500px;
            background: #0a0a0d;
            color: var(--accent2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            overflow-y: auto;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }
        
        .btn-run {
            background: var(--correct);
            color: #fff;
            font-size: 18px;
            padding: 16px 40px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(46,204,113,0.3);
        }
        .btn-run:hover { 
            background: #27ae60; 
            transform: translateY(-2px); 
            box-shadow: 0 12px 35px rgba(46,204,113,0.4);
        }
        .btn-run:disabled { 
            background: #555; 
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }
        
        .btn-clear {
            background: var(--border);
            color: var(--muted);
            font-size: 12px;
        }
        .btn-clear:hover { background: #3a3a48; color: var(--text); }
        
        .btn-example {
            background: rgba(124,109,250,0.1);
            color: var(--accent);
            border: 1px solid rgba(124,109,250,0.25);
            font-size: 12px;
            padding: 8px 18px;
            flex-shrink: 0;
        }
        .btn-example:hover { 
            background: rgba(124,109,250,0.2); 
            border-color: var(--accent);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .run-section {
            text-align: center;
            margin: 25px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
        }
        
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .spinner.show { display: inline-block; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error { color: var(--wrong) !important; font-weight: 600; }
        .success { color: var(--correct) !important; font-weight: 600; }

        /* ========== SIDEBAR ========== */
        .hamburger-btn {
            position: fixed; top: 20px; left: 20px; z-index: 200;
            width: 44px; height: 44px;
            background: rgba(21,21,26,0.85); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 12px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 5px; cursor: pointer;
            transition: all 0.3s;
        }
        .hamburger-btn:hover { border-color: var(--accent); box-shadow: 0 0 15px rgba(124,109,250,0.2); }
        .hamburger-line {
            width: 20px; height: 2px; background: var(--text); border-radius: 2px;
            transition: all 0.3s;
        }
        .hamburger-btn.open .hamburger-line:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger-btn.open .hamburger-line:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .hamburger-btn.open .hamburger-line:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        
        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px); z-index: 250; opacity: 0;
            pointer-events: none; transition: opacity 0.3s;
        }
        .sidebar-overlay.show { opacity: 1; pointer-events: all; }
        
        .sidebar {
            position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
            background: rgba(21,21,26,0.95); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); z-index: 260;
            transform: translateX(-100%); transition: transform 0.35s;
            display: flex; flex-direction: column; padding: 0;
        }
        .sidebar.open { transform: translateX(0); }
        
        .sidebar-header {
            padding: 24px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .sidebar-logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-weight: 800; font-size: 18px; color: #fff;
        }
        .sidebar-title { 
            font-family: 'Syne', sans-serif;
            font-weight: 700; 
            font-size: 16px; 
        }
        
        .sidebar-nav {
            flex: 1; padding: 16px 12px; display: flex;
            flex-direction: column; gap: 4px; overflow-y: auto;
        }
        .sidebar-link {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-radius: 10px;
            color: var(--muted); text-decoration: none;
            font-size: 14px; transition: all 0.3s;
            font-weight: 500;
        }
        .sidebar-link:hover { background: rgba(124,109,250,0.1); color: var(--text); }
        .sidebar-link.active { background: rgba(124,109,250,0.15); color: #fff; }
        .sidebar-link .icon {
            width: 28px; height: 28px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }
        .sidebar-footer {
            padding: 16px 20px; border-top: 1px solid var(--border);
            font-size: 11px; color: var(--muted); text-align: center;
            font-family: 'Space Mono', monospace;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .panel { padding: 16px; }
            textarea { font-size: 13px; padding: 14px; min-height: 300px; }
            .btn-run { font-size: 16px; padding: 14px 30px; }
        }
    </style>
</head>
<body>

<div class="compiler-container">
    <h1>💻 Compilador C Online</h1>
    <p class="subtitle">Escreva, compile e execute código C diretamente no navegador · GCC no backend</p>
    
    <div class="editor-panel">
        <!-- COLUNA ESQUERDA: Código -->
        <div class="panel">
            <h3>📝 Código Fonte</h3>
            <textarea id="code-area" placeholder="// Digite seu código C aqui...
#include <stdio.h>

int main() {
    printf(&quot;Hello, World!\n&quot;);
    return 0;
}">#include <stdio.h>

int main() {
    printf("Hello, World!\n");
    return 0;
}</textarea>
            
            <div class="button-group">
                <button class="btn btn-example" onclick="loadExample('hello')">👋 Hello World</button>
                <button class="btn btn-example" onclick="loadExample('menorNumero')">🔢 Menor Número</button>
                <button class="btn btn-example" onclick="loadExample('fatorial')">📐 Fatorial</button>
                <button class="btn btn-example" onclick="loadExample('calculadora')">🧮 Calculadora</button>
                <button class="btn btn-example" onclick="loadExample('tabuada')">📊 Tabuada</button>
                <button class="btn btn-clear" onclick="clearCode()">🗑 Limpar</button>
            </div>
        </div>
        
        <!-- COLUNA DIREITA: Entrada -->
        <div class="panel">
            <h3>📥 Entrada (stdin)</h3>
            <textarea id="input-area" placeholder="Digite aqui os dados de entrada para scanf()...
Exemplo:
45
23
67
12
89
34
56
78
90
15
42
31
68
55
21"></textarea>
        </div>
    </div>
    
    <div class="run-section">
        <button class="btn btn-run" id="run-btn" onclick="compileAndRun()">
            ▶ Executar Código
        </button>
        <span class="spinner" id="spinner"></span>
    </div>
    
    <div class="panel">
        <h3>📤 Saída do Programa</h3>
        <div id="output-area">// O resultado da compilação aparecerá aqui...
// Pressione Ctrl+Enter para executar rapidamente</div>
        <div class="status-bar">
            <span id="status-text">🟢 Pronto para compilar</span>
        </div>
    </div>
</div>

<script src="compiler-c.js"></script>
<script src="footer.js"></script>
<script src="sidebar.js"></script>

</body>
</html>
