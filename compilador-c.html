<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compilador C · SiteParaEstudar</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        :root {
            --bg: #0d0d0f;
            --surface: #15151a;
            --card: #1c1c24;
            --border: #2a2a38;
            --accent: #7c6dfa;
            --text: #e8e8f0;
            --muted: #7878a0;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Fira Code', 'Courier New', monospace;
            min-height: 100vh;
            padding: 20px;
        }
        
        .compiler-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 30px;
            font-size: 2em;
        }
        
        .editor-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .editor-panel { grid-template-columns: 1fr; }
        }
        
        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        
        .panel h3 {
            color: var(--accent);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        textarea {
            width: 100%;
            min-height: 400px;
            background: #0a0a0d;
            color: #e8e8f0;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            tab-size: 4;
        }
        
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(124,109,250,0.2);
        }
        
        #input-area {
            min-height: 100px;
        }
        
        #output-area {
            width: 100%;
            min-height: 200px;
            background: #0a0a0d;
            color: #6dfabc;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-y: auto;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-run {
            background: #2ecc71;
            color: white;
            font-size: 16px;
            padding: 14px 32px;
        }
        .btn-run:hover { background: #27ae60; transform: translateY(-1px); }
        .btn-run:disabled { background: #555; cursor: not-allowed; }
        
        .btn-clear {
            background: var(--border);
            color: var(--muted);
        }
        .btn-clear:hover { background: #3a3a48; }
        
        .btn-example {
            background: rgba(124,109,250,0.15);
            color: var(--accent);
            border: 1px solid rgba(124,109,250,0.3);
            font-size: 12px;
            padding: 8px 16px;
        }
        .btn-example:hover { background: rgba(124,109,250,0.25); }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            font-size: 12px;
            color: var(--muted);
        }
        
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .spinner.show { display: inline-block; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error { color: #e74c3c; }
        .success { color: #2ecc71; }
        
        /* ========== SIDEBAR ========== */
        .hamburger-btn {
            position: fixed; top: 20px; left: 20px; z-index: 200;
            width: 44px; height: 44px;
            background: rgba(21,21,26,0.85); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 12px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 5px; cursor: pointer;
        }
        .hamburger-btn:hover { border-color: var(--accent); }
        .hamburger-line {
            width: 20px; height: 2px; background: var(--text); border-radius: 2px;
        }
        .hamburger-btn.open .hamburger-line:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger-btn.open .hamburger-line:nth-child(2) { opacity: 0; }
        .hamburger-btn.open .hamburger-line:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        
        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px); z-index: 250; opacity: 0;
            pointer-events: none; transition: opacity 0.3s;
        }
        .sidebar-overlay.show { opacity: 1; pointer-events: all; }
        
        .sidebar {
            position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
            background: rgba(21,21,26,0.95); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); z-index: 260;
            transform: translateX(-100%); transition: transform 0.35s;
            display: flex; flex-direction: column; padding: 0;
        }
        .sidebar.open { transform: translateX(0); }
        
        .sidebar-header {
            padding: 24px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .sidebar-logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #7c6dfa, #6dfabc);
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-weight: 800; font-size: 18px; color: #fff;
        }
        .sidebar-title { font-weight: 700; font-size: 16px; }
        
        .sidebar-nav {
            flex: 1; padding: 16px 12px; display: flex;
            flex-direction: column; gap: 4px;
        }
        .sidebar-link {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-radius: 10px;
            color: var(--muted); text-decoration: none;
            font-size: 14px; transition: all 0.3s;
        }
        .sidebar-link:hover { background: rgba(124,109,250,0.1); color: var(--text); }
        .sidebar-link.active { background: rgba(124,109,250,0.15); color: #fff; }
        .sidebar-link .icon {
            width: 28px; height: 28px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }
        .sidebar-footer {
            padding: 16px 20px; border-top: 1px solid var(--border);
            font-size: 11px; color: var(--muted); text-align: center;
        }
    </style>
</head>
<body>


<div class="compiler-container">
    <h1>💻 Compilador C Online</h1>
    
    <div class="editor-panel">
        <div class="panel">
            <h3>📝 Código Fonte</h3>
            <textarea id="code-area" placeholder="// Digite seu código C aqui...
#include <stdio.h>

int main() {
    printf(&quot;Hello, World!\\n&quot;);
    return 0;
}">#include <stdio.h>

int main() {
    printf("Hello, World!\n");
    return 0;
}</textarea>
            
            <div class="button-group">
                <button class="btn btn-example" onclick="loadExample('hello')">👋 Hello World</button>
                <button class="btn btn-example" onclick="loadExample('loop')">🔄 Loop For</button>
                <button class="btn btn-example" onclick="loadExample('array')">📊 Array</button>
                <button class="btn btn-example" onclick="loadExample('function')">🔧 Função</button>
                <button class="btn btn-example" onclick="loadExample('pointer')">👉 Ponteiros</button>
                <button class="btn btn-clear" onclick="clearCode()">🗑 Limpar</button>
            </div>
        </div>
        
        <div class="panel">
            <h3>📥 Entrada (stdin)</h3>
            <textarea id="input-area" placeholder="Dados de entrada (scanf)..."></textarea>
        </div>
    </div>
    
    <div style="text-align: center; margin: 20px 0;">
        <button class="btn btn-run" id="run-btn" onclick="compileAndRun()">
            ▶ Executar Código
        </button>
        <span class="spinner" id="spinner"></span>
    </div>
    
    <div class="panel">
        <h3>📤 Saída</h3>
        <div id="output-area">// O resultado aparecerá aqui...</div>
        <div class="status-bar">
            <span id="status-text">Pronto para compilar</span>
        </div>
    </div>
</div>

<script src="compiler-c.js"></script>
<script src="footer.js"></script>
<script src="sidebar.js"></script>

</body>
</html>
