<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6dfa"/>
      <stop offset="100%" style="stop-color:#6dfabc"/>
    </linearGradient>
  </defs>
  
  <!-- Fundo arredondado -->
  <rect width="48" height="48" rx="12" fill="url(#g)"/>
  
  <!-- Borda interna suave -->
  <rect x="1" y="1" width="46" height="46" rx="11" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  
  <!-- Círculo decorativo canto superior direito -->
  <circle cx="38" cy="12" r="6" fill="white" opacity="0.12"/>
  
  <!-- Círculo decorativo canto inferior esquerdo -->
  <circle cx="8" cy="40" r="8" fill="white" opacity="0.08"/>
  
  <!-- Letras SPE -->
  <text x="24" y="33" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">SPE</text>
</svg>
