<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmes · SiteParaEstudar</title>
    <link rel="icon" href="Style/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="Style/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --surface: #15151a;
            --card: #1c1c24;
            --border: #2a2a38;
            --accent: #7c6dfa;
            --accent2: #fa6d8a;
            --accent3: #6dfabc;
            --accent4: #fadc6d;
            --text: #e8e8f0;
            --muted: #7878a0;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .hamburger-btn {
            position: fixed; top: 20px; left: 20px; z-index: 200;
            width: 44px; height: 44px;
            background: rgba(21, 21, 26, 0.85); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 12px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 5px; cursor: pointer;
            transition: all var(--transition); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .hamburger-btn:hover { border-color: var(--accent2); }
        .hamburger-line {
            width: 20px; height: 2px; background: var(--text);
            border-radius: 2px; transition: all 0.3s ease;
        }
        .hamburger-btn.open .hamburger-line:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger-btn.open .hamburger-line:nth-child(2) { opacity: 0; }
        .hamburger-btn.open .hamburger-line:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px); z-index: 250;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .sidebar-overlay.show { opacity: 1; pointer-events: all; }

        .sidebar {
            position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
            background: rgba(21, 21, 26, 0.95); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); z-index: 260;
            transform: translateX(-100%); transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: 5px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header {
            padding: 24px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .sidebar-logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-weight: 800; font-size: 18px; color: #fff;
        }
        .sidebar-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: var(--text); }
        .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
        .sidebar-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            border-radius: 10px; color: var(--muted); text-decoration: none;
            font-size: 14px; font-weight: 500; transition: all var(--transition);
        }
        .sidebar-link:hover { background: rgba(250,109,138,0.1); color: var(--text); }
        .sidebar-link.active {
            background: rgba(250,109,138,0.15); border: 1px solid rgba(250,109,138,0.3); color: #fff;
        }

        .header {
            background: rgba(21, 21, 26, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); padding: 16px 30px 16px 80px;
            display: flex; align-items: center; gap: 20px;
            position: sticky; top: 0; z-index: 100;
        }

        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; font-size: 20px;
        }
        .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: #fff; }
        .header-nav { display: flex; gap: 8px; margin-left: auto; }
        .nav-link {
            padding: 8px 16px; border-radius: 8px; color: var(--muted);
            text-decoration: none; font-size: 14px; font-weight: 500; transition: all var(--transition);
        }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-link.active { color: #fff; background: var(--accent2); }

        .hero {
            padding: 40px 30px; text-align: center;
            background: linear-gradient(135deg, rgba(250,109,138,0.1), rgba(124,109,250,0.1));
            border-bottom: 1px solid var(--border);
        }
        .hero h1 {
            font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .hero p { color: var(--muted); font-size: 16px; }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px 30px; }

        .search-bar { display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap; }
        .search-input {
            flex: 1; min-width: 250px; padding: 12px 20px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; color: #fff; font-family: 'Inter', sans-serif; font-size: 14px;
        }
        .search-input:focus { outline: none; border-color: var(--accent2); }
        .filter-btn {
            padding: 10px 18px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); cursor: pointer; font-family: 'Inter', sans-serif;
            font-size: 13px; transition: all var(--transition); display: flex; align-items: center; gap: 6px;
        }
        .filter-btn:hover { border-color: var(--accent2); }
        .filter-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

        .section-title {
            font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700;
            margin-bottom: 20px; color: #fff; display: flex; align-items: center; gap: 10px;
        }
        .movie-count {
            font-family: 'Space Mono', monospace; font-size: 13px; color: var(--muted);
            background: var(--surface); padding: 4px 12px; border-radius: 15px; border: 1px solid var(--border);
        }
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px; margin-bottom: 40px;
        }
        .movie-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius-lg); overflow: hidden;
            transition: all 0.3s ease; cursor: pointer;
            text-decoration: none; color: var(--text); display: flex; flex-direction: column;
        }
        .movie-card:hover {
            transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: var(--accent2);
        }
        .movie-thumb {
            width: 100%; aspect-ratio: 2/3;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .movie-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .play-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.3); display: flex;
            align-items: center; justify-content: center;
            opacity: 0; transition: all 0.3s ease;
        }
        .movie-card:hover .play-overlay { opacity: 1; }
        .play-icon {
            width: 55px; height: 55px;
            background: rgba(250,109,138,0.9); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #fff; transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(250,109,138,0.4);
        }
        .movie-info { padding: 15px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .movie-badge {
            display: inline-flex; align-items: center; gap: 5px;
            font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 600;
            padding: 3px 10px; border-radius: 15px; width: fit-content;
            background: rgba(250,220,109,0.1); border: 1px solid rgba(250,220,109,0.3); color: var(--accent4);
        }
        .movie-badge.google-drive {
            background: rgba(66,133,244,0.15); border: 1px solid rgba(66,133,244,0.3); color: #4285F4;
        }
        .movie-title {
            font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
            color: #fff; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .movie-meta {
            display: flex; align-items: center; gap: 10px;
            font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted);
            margin-top: auto; padding-top: 8px; border-top: 1px solid var(--border);
        }

        .movie-classificacao {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(0,0,0,0.9); color: #fff;
            font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px;
            padding: 5px 10px; border-radius: 8px; border: 2px solid;
            z-index: 5; letter-spacing: 1px; backdrop-filter: blur(4px);
            min-width: 32px; text-align: center; line-height: 1;
        }
        .classificacao-L { border-color: #4CAF50; color: #4CAF50; }
        .classificacao-10 { border-color: #2196F3; color: #2196F3; }
        .classificacao-12 { border-color: #FFC107; color: #FFC107; }
        .classificacao-14 { border-color: #FF9800; color: #FF9800; }
        .classificacao-16 { border-color: #f44336; color: #f44336; }
        .classificacao-18 { border-color: #000; color: #fff; background: #f44336; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); display: none; }
        .empty-state .icon-big { font-size: 80px; margin-bottom: 20px; }
        .empty-state h2 { font-family: 'Syne', sans-serif; font-size: 22px; color: #fff; margin-bottom: 10px; }

        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent2); color: #fff; padding: 12px 24px;
            border-radius: 20px; font-family: 'Syne', sans-serif; font-size: 13px;
            font-weight: 700; z-index: 400; transition: transform 0.3s ease; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 768px) {
            .header { padding: 16px 15px 16px 60px; }
            .container { padding: 15px; }
            .hero { padding: 30px 15px; }
            .hero h1 { font-size: 26px; }
            .movies-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
            .hamburger-btn { top: 14px; left: 12px; width: 38px; height: 38px; }
            .movie-info { padding: 10px; }
            .movie-title { font-size: 13px; }
        }
    </style>
</head>
<body>

    <button class="hamburger-btn" id="hamburger-btn" onclick="toggleSidebar()">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
    </button>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <header class="header">
        <a href="#" class="logo">
            <div class="logo-icon">🎬</div>
            <span class="logo-text">Filmes</span>
        </a>
        <nav class="header-nav">
            <a href="filmes.html" class="nav-link active">🎬 Filmes</a>
            <a href="livros.html" class="nav-link">📚 Livros</a>
        </nav>
    </header>

    <div class="hero">
        <h1>🎬 Catálogo de Filmes</h1>
        <p>Filmes para aula de Administração</p>
    </div>

    <div class="container">
        <div class="search-bar">
            <input type="text" class="search-input" id="search-input" placeholder="🔍 Pesquisar filme...">
            <button class="filter-btn active" data-filter="all">🎬 Todos</button>
        </div>

        <h2 class="section-title">
            📽️ Filmes Disponíveis
            <span class="movie-count" id="movie-count">0 filmes</span>
        </h2>

        <div class="movies-grid" id="movies-grid"></div>

        <div class="empty-state" id="empty-state">
            <div class="icon-big">🎞️</div>
            <h2>Nenhum filme encontrado</h2>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('show');
            document.getElementById('hamburger-btn').classList.toggle('open');
        }

        const filmes = [
            { 
                nome: "Charlie Chaplin Tempos Modernos", 
                arquivo: "https://drive.google.com/file/d/1MRuQ1bTygcuAKiM9TuLXhTlJu7XvzcQi/preview",
                tipo: "gdrive", tamanho: "1.6 GB", duracao: "1h 27min",
                poster: "filmes/poster/POSTERCharlie.jpg", classificacao: "L"
            },
            { 
                nome: "Piratas da Informática", 
                arquivo: "https://drive.google.com/file/d/1GbqjsOEU4rr_lbGE_QlKdaghoP8ZrcA7/preview",
                tipo: "gdrive", tamanho: "1 GB", duracao: "1h 36min",
                poster: "filmes/poster/Pirates_of_silicon_valley_poster_promocional.png", classificacao: "14"
            },
            { 
                nome: "Made in Dagenham Parte I", 
                arquivo: "https://drive.google.com/file/d/1bYj_-wdm-CxXGs3xvnOFWv78og1vh3L0/preview",
                tipo: "gdrive", tamanho: "311 MB", duracao: "52min",
                poster: "filmes/poster/madeInDagenham.jpeg", classificacao: "16"
            },
             { 
                nome: "Made in Dagenham Parte II", 
                arquivo: "https://drive.google.com/file/d/1G256XyNp445oczTWj-lPwq5YVXZ9v6Ki/view?usp=sharing",
                tipo: "gdrive", tamanho: "311 MB", duracao: "52min",
                poster: "filmes/poster/madeInDagenham.jpeg", classificacao: "16"
            },
            { 
                nome: "Germinal (1993)", 
                arquivo: "https://drive.google.com/file/d/1Qe3QaPDcf2x_tcScFV3CHdDzqgxEzFHR/preview",
                tipo: "gdrive", tamanho: "826 MB", duracao: "2h 31min",
                poster: "filmes/poster/germinal.jpg", classificacao: "16"
            },
            { 
                nome: "Norma Rae (1979)", 
                arquivo: "https://drive.google.com/file/d/1lNjxIOVEh3i4Qs5_HJHfFesHPy5AZC4g/view?usp=sharing",
                tipo: "gdrive", tamanho: "1.7 GB", duracao: "2h 49min",
                poster: "filmes/poster/NormaRae.jpg", classificacao: "10"
            },
        ];

        function renderMovies(searchTerm = '') {
            const grid = document.getElementById('movies-grid');
            const emptyState = document.getElementById('empty-state');
            const movieCount = document.getElementById('movie-count');

            let filtered = [...filmes];
            if (searchTerm) {
                filtered = filtered.filter(f => f.nome.toLowerCase().includes(searchTerm.toLowerCase()));
            }

            movieCount.textContent = filtered.length + ' filme(s)';

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            grid.innerHTML = filtered.map(f => {
                const url = 'assistirFilmes.html?video=' + encodeURIComponent(f.arquivo) + '&t=' + encodeURIComponent(f.nome) + '&tipo=' + (f.tipo||'local');
                return `
                    <a href="${url}" class="movie-card" title="${f.nome}">
                        <div class="movie-thumb">
                            ${f.poster ? '<img src="'+f.poster+'" alt="'+f.nome+'" onerror="this.style.display=\'none\'">' : ''}
                            <div class="play-overlay"><div class="play-icon">▶</div></div>
                            ${f.classificacao ? '<span class="movie-classificacao classificacao-'+f.classificacao+'">'+f.classificacao+'</span>' : ''}
                        </div>
                        <div class="movie-info">
                            <span class="movie-badge${f.tipo==='gdrive'?' google-drive':''}">${f.tipo==='gdrive'?'☁️ Drive':'🎬 Filme'}</span>
                            <div class="movie-title">${f.nome}</div>
                            <div class="movie-meta">
                                <span>📦 ${f.tamanho}</span>
                                <span>⏱️ ${f.duracao}</span>
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        document.getElementById('search-input').addEventListener('input', function() {
            renderMovies(this.value);
        });

        renderMovies();
    </script>
    <script src="JS/footer.js"></script>
    <script src="JS/sidebar.js"></script>
</body>
</html>
